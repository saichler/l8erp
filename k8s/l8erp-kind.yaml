# KIND cluster version — uses KIND's built-in standard StorageClass
# KIND ships with rancher/local-path-provisioner pre-installed as StorageClass "standard"
# No custom StorageClass definition needed.
apiVersion: v1
kind: Namespace
metadata:
  name: l8erp
  labels:
    name: l8erp

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: l8erp
  name: erp-vnet
  labels:
    app: erp-vnet
spec:
  serviceName: erp-vnet
  replicas: 1
  selector:
    matchLabels:
      app: erp-vnet
  template:
    metadata:
      labels:
        app: erp-vnet
    spec:
      hostNetwork: true
      containers:
        - name: erp-vnet
          image: saichler/erp-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 34999
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: standard
        resources:
          requests:
            storage: 5Gi

---

