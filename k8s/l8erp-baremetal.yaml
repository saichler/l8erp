# Bare-metal PVC version — requires local-path-provisioner:
#   kubectl apply -f https://raw.githubusercontent.com/rancher/local-path-provisioner/master/deploy/local-path-storage.yaml
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: l8erp-local-storage
provisioner: rancher.io/local-path
reclaimPolicy: Delete
volumeBindingMode: WaitForFirstConsumer

---

apiVersion: v1
kind: Namespace
metadata:
  name: l8erp
  labels:
    name: l8erp

---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: l8erp
  name: erp-vnet
  labels:
    app: erp-vnet
spec:
  serviceName: erp-vnet
  replicas: 3
  selector:
    matchLabels:
      app: erp-vnet
  template:
    metadata:
      labels:
        app: erp-vnet
    spec:
      hostNetwork: true
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: erp-vnet
              topologyKey: kubernetes.io/hostname
      containers:
        - name: erp-vnet
          image: saichler/erp-vnet:latest
          imagePullPolicy: Always
          env:
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          ports:
            - containerPort: 34999
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: l8erp-local-storage
        resources:
          requests:
            storage: 5Gi

---

