---

apiVersion: apps/v1
kind: StatefulSet
metadata:
  namespace: l8erp
  name: erp-log-agent
  labels:
    app: erp-log-agent
spec:
  serviceName: erp-log-agent
  replicas: 3
  selector:
    matchLabels:
      app: erp-log-agent
  template:
    metadata:
      labels:
        app: erp-log-agent
    spec:
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: erp-log-agent
              topologyKey: kubernetes.io/hostname
      containers:
        - name: erp-log-agent
          image: saichler/erp-log-agent:latest
          imagePullPolicy: Always
          env:
            - name: LOGPATH
              value: /data/logs/erp
            - name: LOGFILE
              value: "*"
            - name: NODE_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.hostIP
          volumeMounts:
            - name: hdata
              mountPath: /data
  volumeClaimTemplates:
    - metadata:
        name: hdata
      spec:
        accessModes: [ "ReadWriteOnce" ]
        storageClassName: l8erp-local-storage
        resources:
          requests:
            storage: 2Gi

