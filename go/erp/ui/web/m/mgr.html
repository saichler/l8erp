<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#0ea5e9">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Manager Portal</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" href="../l8ui/images/logo.gif">
    <link rel="apple-touch-icon" href="../l8ui/images/logo.gif">

    <!-- CSS -->
    <link rel="stylesheet" href="css/app-base.css">
    <link rel="stylesheet" href="css/app-header.css">
    <link rel="stylesheet" href="css/app-sidebar.css">
    <link rel="stylesheet" href="../l8ui/m/css/layer8m-popup.css">
    <link rel="stylesheet" href="../l8ui/m/css/layer8m-confirm.css">
    <link rel="stylesheet" href="../l8ui/m/css/layer8m-table.css">
    <link rel="stylesheet" href="../l8ui/m/css/layer8m-edit-table.css">
    <link rel="stylesheet" href="../l8ui/m/css/layer8m-forms.css">
    <link rel="stylesheet" href="../l8ui/shared/layer8d-form-fields.css">
    <link rel="stylesheet" href="../l8ui/shared/layer8-file-upload.css">
    <link rel="stylesheet" href="../l8ui/m/css/layer8m-datepicker.css">
    <link rel="stylesheet" href="../l8ui/m/css/layer8m-reference-picker.css">
    <link rel="stylesheet" href="../l8ui/shared/layer8-print.css" media="print">
    <!-- Shared Portal CSS -->
    <link rel="stylesheet" href="../l8ui/portal/layer8m-portal.css">
    <link rel="stylesheet" href="../l8ui/shared/layer8-section-layout.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="mobile-header">
            <button class="header-menu-btn" id="menu-toggle">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"></line>
                    <line x1="3" y1="12" x2="21" y2="12"></line>
                    <line x1="3" y1="18" x2="21" y2="18"></line>
                </svg>
            </button>
            <div class="header-logo">
                <img src="../l8ui/images/logo.gif" alt="MGR">
                <span class="header-logo-text">Manager Portal</span>
            </div>
            <div class="header-actions">
                <button class="header-action-btn" id="refresh-btn" title="Refresh">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M23 4v6h-6"></path>
                        <path d="M1 20v-6h6"></path>
                        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
                    </svg>
                </button>
            </div>
        </header>

        <!-- Sidebar Overlay -->
        <div class="sidebar-overlay" id="sidebar-overlay"></div>

        <!-- Sidebar -->
        <aside class="mobile-sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <img src="../l8ui/images/logo.gif" alt="MGR">
                    <span class="sidebar-logo-text">Manager</span>
                </div>
            </div>

            <nav id="l8-portal-sidebar-nav">
                <!-- Populated dynamically by portal framework -->
            </nav>

            <div class="sidebar-user">
                <div class="sidebar-user-info">
                    <div class="sidebar-avatar" id="user-avatar">M</div>
                    <div class="sidebar-user-details">
                        <div class="sidebar-user-name" id="user-name">Manager</div>
                        <div class="sidebar-user-role">Manager</div>
                    </div>
                </div>
                <button class="sidebar-logout-btn" onclick="MobileMGR.logout()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Logout
                </button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <div id="content-area">
                <div class="loading">Loading</div>
            </div>
        </main>
    </div>

    <!-- Scripts - Core Mobile Framework -->
    <script src="../l8ui/m/js/layer8m-config.js"></script>
    <script src="../l8ui/m/js/layer8m-auth.js"></script>
    <script src="../l8ui/m/js/layer8m-utils.js"></script>
    <!-- Shared Desktop Utilities (needed for currency cache, renderers) -->
    <script src="../l8ui/shared/layer8d-config.js"></script>
    <script src="../l8ui/shared/layer8d-utils.js"></script>
    <script src="../l8ui/shared/layer8d-renderers.js"></script>
    <script src="../l8ui/shared/layer8d-reference-registry.js"></script>
    <!-- Factory Components -->
    <script src="../l8ui/shared/layer8-enum-factory.js"></script>
    <script src="../l8ui/shared/layer8-ref-factory.js"></script>
    <script src="../l8ui/shared/layer8-column-factory.js"></script>
    <script src="../l8ui/shared/layer8-form-factory.js"></script>
    <script src="../l8ui/shared/layer8-form-factory-presets.js"></script>
    <script src="../l8ui/shared/layer8d-module-config-factory.js"></script>
    <!-- Service Registry (needed for form definition lookups) -->
    <script src="../l8ui/shared/layer8d-service-registry.js"></script>
    <!-- Mobile Components -->
    <script src="../l8ui/m/js/layer8m-popup.js"></script>
    <script src="../l8ui/m/js/layer8m-confirm.js"></script>
    <script src="../l8ui/m/js/layer8m-data-source.js"></script>
    <script src="../l8ui/m/js/layer8m-table.js"></script>
    <script src="../l8ui/m/js/layer8m-edit-table.js"></script>
    <script src="../l8ui/shared/layer8-csv-export.js"></script>
    <script src="../l8ui/shared/layer8-file-upload.js"></script>
    <script src="../l8ui/m/js/layer8m-forms-fields.js"></script>
    <script src="../l8ui/m/js/layer8m-forms-fields-reference.js"></script>
    <script src="../l8ui/m/js/layer8m-forms-fields-ext.js"></script>
    <script src="../l8ui/m/js/layer8m-forms.js"></script>
    <script src="../l8ui/m/js/layer8m-forms-inline.js"></script>
    <script src="../l8ui/m/js/layer8m-datepicker.js"></script>
    <!-- Mobile Reference Registry -->
    <script src="../l8ui/m/js/layer8m-reference-registry.js"></script>
    <script src="../erp-ui/m/reference-registries/layer8m-reference-registry-hcm.js"></script>
    <script src="../l8ui/m/js/layer8m-reference-picker.js"></script>
    <!-- Mobile Renderers -->
    <script src="../l8ui/m/js/layer8m-renderers.js"></script>
    <!-- Mobile CRUD -->
    <script src="../l8ui/m/js/layer8m-nav-crud.js"></script>
    <!-- Portal Framework -->
    <script src="../l8ui/portal/layer8d-portal-dashboard.js"></script>
    <script src="../l8ui/portal/layer8m-portal.js"></script>

    <!-- HCM Module Config (registers HCM service endpoints for reference pickers) -->
    <script src="../hcm/hcm-config.js"></script>
    <script>
        // Register HCM submodules with ServiceRegistry so getEndpointForModel() can resolve reference pickers
        if (typeof Layer8DServiceRegistry !== 'undefined' && window.HCM && HCM.submodules) {
            HCM.submodules.forEach(function(sub) { Layer8DServiceRegistry.register('HCM', sub); });
        }
    </script>

    <!-- HCM Module Enums & Forms (reused for detail views) -->
    <script src="../hcm/core-hr/core-hr-enums.js"></script>
    <script src="../hcm/core-hr/core-hr-forms.js"></script>
    <script src="../hcm/time/time-enums.js"></script>
    <script src="../hcm/time/time-forms.js"></script>
    <script src="../hcm/talent/talent-enums-recruiting.js"></script>
    <script src="../hcm/talent/talent-enums-performance.js"></script>
    <script src="../hcm/talent/talent-enums.js"></script>
    <script src="../hcm/talent/talent-forms.js"></script>
    <script src="../hcm/compensation/compensation-enums.js"></script>
    <script src="../hcm/compensation/compensation-forms.js"></script>

    <!-- Shared MGR Data Files (reused from desktop) -->
    <script src="../mgr/mgr-enums.js"></script>
    <script src="../mgr/mgr-config.js"></script>
    <script src="../mgr/mgr-nav-config.js"></script>
    <script src="../mgr/mgr-columns.js"></script>
    <script src="../mgr/mgr-forms.js"></script>

    <!-- Mobile MGR Scripts -->
    <script src="js/mgr/mgr-dashboard.js"></script>
    <script src="js/mgr/mgr-actions.js"></script>
    <script src="js/mgr/mgr-app.js"></script>
</body>
</html>
