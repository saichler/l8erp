<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Employee Self-Service</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Theme & Layout -->
    <link rel="stylesheet" href="l8ui/shared/layer8d-theme-tokens.css">
    <link rel="stylesheet" href="l8ui/shared/layer8d-theme.css">
    <link rel="stylesheet" href="l8ui/shared/layer8d-animations.css">
    <link rel="stylesheet" href="l8ui/shared/layer8d-scrollbar.css">
    <link rel="stylesheet" href="l8ui/shared/layer8-print.css" media="print">
    <!-- Table & Component CSS -->
    <link rel="stylesheet" href="l8ui/edit_table/layer8d-table.css">
    <link rel="stylesheet" href="l8ui/popup/layer8d-popup.css">
    <link rel="stylesheet" href="l8ui/popup/layer8d-popup-forms.css">
    <link rel="stylesheet" href="l8ui/shared/layer8d-form-fields.css">
    <link rel="stylesheet" href="l8ui/popup/layer8d-popup-inline-table.css">
    <link rel="stylesheet" href="l8ui/popup/layer8d-popup-content.css">
    <link rel="stylesheet" href="l8ui/datepicker/layer8d-datepicker.css">
    <link rel="stylesheet" href="l8ui/reference_picker/layer8d-reference-picker.css">
    <link rel="stylesheet" href="l8ui/input_formatters/layer8d-input-formatter.css">
    <link rel="stylesheet" href="l8ui/notification/layer8d-notification.css">
    <link rel="stylesheet" href="l8ui/shared/layer8-file-upload.css">
    <!-- Shared Portal CSS -->
    <link rel="stylesheet" href="l8ui/portal/layer8d-portal.css">
    <link rel="stylesheet" href="l8ui/shared/layer8-section-layout.css">
</head>
<body>
    <div class="l8-portal-container">
        <!-- Header -->
        <header class="l8-portal-header">
            <div class="l8-portal-header-left">
                <img src="l8ui/images/logo.gif" alt="Logo" class="l8-portal-header-logo">
                <div class="l8-portal-header-title">
                    <h1>Employee Self-Service</h1>
                    <p>ERP by Layer 8</p>
                </div>
            </div>
            <div class="l8-portal-header-right">
                <div class="layer8d-theme-picker">
                    <button class="layer8d-theme-btn" onclick="Layer8DThemeSwitcher.toggleDropdown()" aria-label="Choose theme">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="10"/><path d="M12 2a7 7 0 0 0 0 20V2z"/>
                        </svg>
                    </button>
                    <div class="layer8d-theme-menu"></div>
                </div>
                <span class="l8-portal-username">Employee</span>
                <button class="l8-portal-logout-btn" onclick="logout()">Logout</button>
            </div>
        </header>

        <!-- Body -->
        <div class="l8-portal-body">
            <!-- Sidebar Navigation -->
            <nav class="l8-portal-sidebar">
                <ul class="l8-portal-nav-menu">
                    <!-- Populated dynamically by portal framework -->
                </ul>
            </nav>

            <!-- Main Content -->
            <main class="l8-portal-content" id="l8-portal-content-area">
                <!-- Populated dynamically -->
            </main>
        </div>
    </div>

    <!-- Popup Root -->
    <div id="layer8d-popup-root"></div>

    <!-- Shared l8ui Scripts (in dependency order) -->
    <script src="l8ui/shared/layer8d-config.js"></script>
    <script src="l8ui/shared/layer8d-utils.js"></script>
    <script src="l8ui/shared/layer8d-renderers.js"></script>
    <script src="l8ui/shared/layer8d-reference-registry.js"></script>
    <script src="l8ui/shared/layer8d-portal-switcher.js"></script>
    <!-- Factory Components -->
    <script src="l8ui/shared/layer8-enum-factory.js"></script>
    <script src="l8ui/shared/layer8-ref-factory.js"></script>
    <script src="l8ui/shared/layer8-column-factory.js"></script>
    <script src="l8ui/shared/layer8-form-factory.js"></script>
    <script src="l8ui/shared/layer8-form-factory-presets.js"></script>
    <script src="l8ui/shared/layer8d-module-config-factory.js"></script>
    <!-- Notification -->
    <script src="l8ui/notification/layer8d-notification.js"></script>
    <!-- Input Formatters -->
    <script src="l8ui/input_formatters/layer8d-input-formatter-utils.js"></script>
    <script src="l8ui/input_formatters/layer8d-input-formatter-masks.js"></script>
    <script src="l8ui/input_formatters/layer8d-input-formatter-types-validators.js"></script>
    <script src="l8ui/input_formatters/layer8d-input-formatter-types.js"></script>
    <script src="l8ui/input_formatters/layer8d-input-formatter-core.js"></script>
    <script src="l8ui/input_formatters/layer8d-input-formatter.js"></script>
    <!-- Service Registry -->
    <script src="l8ui/shared/layer8d-service-registry.js"></script>
    <!-- Forms -->
    <script src="l8ui/shared/layer8-format-display.js"></script>
    <script src="l8ui/shared/layer8d-forms-fields.js"></script>
    <script src="l8ui/shared/layer8d-forms-fields-ext.js"></script>
    <script src="l8ui/shared/layer8d-forms-data.js"></script>
    <script src="l8ui/shared/layer8d-forms-pickers.js"></script>
    <script src="l8ui/shared/layer8d-forms-modal.js"></script>
    <script src="l8ui/shared/layer8d-forms.js"></script>
    <!-- Popup -->
    <script src="l8ui/popup/layer8d-popup.js"></script>
    <!-- Date Picker -->
    <script src="l8ui/datepicker/layer8d-datepicker-utils.js"></script>
    <script src="l8ui/datepicker/layer8d-datepicker-calendar.js"></script>
    <script src="l8ui/datepicker/layer8d-datepicker-core.js"></script>
    <script src="l8ui/datepicker/layer8d-datepicker.js"></script>
    <!-- Reference Picker -->
    <script src="l8ui/reference_picker/layer8d-reference-picker-utils.js"></script>
    <script src="l8ui/reference_picker/layer8d-reference-picker-data.js"></script>
    <script src="l8ui/reference_picker/layer8d-reference-picker-render.js"></script>
    <script src="l8ui/reference_picker/layer8d-reference-picker-events.js"></script>
    <script src="l8ui/reference_picker/layer8d-reference-picker-core.js"></script>
    <script src="l8ui/reference_picker/layer8d-reference-picker.js"></script>
    <!-- Table -->
    <script src="l8ui/edit_table/layer8d-table-core.js"></script>
    <script src="l8ui/edit_table/layer8d-table-data.js"></script>
    <script src="l8ui/edit_table/layer8d-table-render.js"></script>
    <script src="l8ui/edit_table/layer8d-table-events.js"></script>
    <script src="l8ui/edit_table/layer8d-table-filter.js"></script>
    <script src="l8ui/edit_table/layer8d-table.js"></script>
    <!-- Export -->
    <script src="l8ui/shared/layer8-csv-export.js"></script>
    <!-- Data Source -->
    <script src="l8ui/shared/layer8d-data-source.js"></script>
    <!-- Section Generator & SVG (needed by portal illustrated headers) -->
    <script src="l8ui/shared/layer8-svg-factory.js"></script>
    <script src="erp-ui/erp-svg-templates.js"></script>
    <script src="l8ui/shared/layer8-section-generator.js"></script>
    <!-- Portal Framework -->
    <script src="l8ui/portal/layer8d-portal-dashboard.js"></script>
    <script src="l8ui/portal/layer8d-portal.js"></script>
    <!-- Theme Switcher -->
    <script src="l8ui/shared/layer8d-theme-switcher.js"></script>
    <script>Layer8DThemeSwitcher.init();</script>

    <!-- Reference Data (must load BEFORE reference registries) -->
    <script src="js/reference-data/reference-data-hcm.js"></script>
    <script src="js/reference-data/reference-data-fin.js"></script>
    <!-- HCM Reference Registry (needed by HCM forms) -->
    <script src="js/reference-registry-hcm.js"></script>
    <!-- FIN Reference Registry (needed by compensation/payroll money fields) -->
    <script src="js/reference-registry-fin.js"></script>
    <script src="js/reference-registry-fin-scm.js"></script>

    <!-- HCM Module Config (registers HCM service endpoints for reference pickers) -->
    <script src="hcm/hcm-config.js"></script>
    <script>
        // Register HCM submodules with ServiceRegistry so getEndpointForModel() can resolve reference pickers
        if (typeof Layer8DServiceRegistry !== 'undefined' && window.HCM && HCM.submodules) {
            HCM.submodules.forEach(function(sub) { Layer8DServiceRegistry.register('HCM', sub); });
        }
    </script>

    <!-- HCM Module Enums & Forms (reused for detail views) -->
    <script src="hcm/core-hr/core-hr-enums.js"></script>
    <script src="hcm/core-hr/core-hr-forms.js"></script>
    <script src="hcm/payroll/payroll-enums.js"></script>
    <script src="hcm/payroll/payroll-forms.js"></script>
    <script src="hcm/benefits/benefits-enums.js"></script>
    <script src="hcm/benefits/benefits-forms.js"></script>
    <script src="hcm/time/time-enums.js"></script>
    <script src="hcm/time/time-forms.js"></script>
    <script src="hcm/talent/talent-enums-recruiting.js"></script>
    <script src="hcm/talent/talent-enums-performance.js"></script>
    <script src="hcm/talent/talent-enums.js"></script>
    <script src="hcm/talent/talent-forms.js"></script>
    <script src="hcm/learning/learning-enums.js"></script>
    <script src="hcm/learning/learning-forms.js"></script>
    <script src="hcm/compensation/compensation-enums.js"></script>
    <script src="hcm/compensation/compensation-forms.js"></script>

    <!-- ESS Portal Scripts (in dependency order) -->
    <script src="ess/ess-enums.js"></script>
    <script src="ess/ess-config.js"></script>
    <script src="ess/ess-nav-config.js"></script>
    <script src="ess/ess-columns.js"></script>
    <script src="ess/ess-forms.js"></script>
    <script src="ess/ess-dashboard.js"></script>
    <script src="ess/ess-actions.js"></script>
    <script src="ess/ess-app.js"></script>
</body>
</html>
