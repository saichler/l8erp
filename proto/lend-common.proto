enum LendCollateralStatus {
  LEND_COLLATERAL_STATUS_UNSPECIFIED = 0;
  LEND_COLLATERAL_STATUS_PLEDGED = 1;
  LEND_COLLATERAL_STATUS_RELEASED = 2;
  LEND_COLLATERAL_STATUS_SEIZED = 3;
