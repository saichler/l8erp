syntax = "proto3";

package fin;

option go_package = "./types/fin";

import "l8common.proto";
import "api.proto";

// ============================================================================
// FINANCIAL REPORTS
// Server-side computed financial statements and reports
// ============================================================================

// --- Report Type Enum ---

enum FinReportType {
  FIN_REPORT_TYPE_UNSPECIFIED = 0;
  FIN_REPORT_TYPE_BALANCE_SHEET = 1;
  FIN_REPORT_TYPE_INCOME_STATEMENT = 2;
  FIN_REPORT_TYPE_TRIAL_BALANCE = 3;
  FIN_REPORT_TYPE_BUDGET_VS_ACTUAL = 4;
  FIN_REPORT_TYPE_AGED_RECEIVABLES = 5;
  FIN_REPORT_TYPE_AGED_PAYABLES = 6;
  FIN_REPORT_TYPE_GL_DETAIL = 7;
}

// --- Request/Response Types ---

message FinReport {
  string report_id = 1;
  FinReportType report_type = 2;
  string fiscal_period_id = 3;
  string fiscal_year_id = 4;
  string department_id = 5;
  string currency_id = 6;
  string account_id = 7;
  string title = 8;
  string period_name = 9;
  int64 generated_at = 10;
  repeated FinReportSection sections = 11;
  l8common.Money grand_total = 12;
  int32 row_count = 13;
  l8common.AuditInfo audit_info = 30;
}

message FinReportList {
  repeated FinReport list = 1;
  l8api.L8MetaData metadata = 2;
}

message FinReportSection {
  string title = 1;
  repeated FinReportLine lines = 2;
  l8common.Money section_total = 3;
}

message FinReportLine {
  string account_id = 1;
  string account_number = 2;
  string account_name = 3;
  int32 level = 4;
  bool is_header = 5;
  l8common.Money debit = 6;
  l8common.Money credit = 7;
  l8common.Money balance = 8;
  l8common.Money budget_amount = 9;
  l8common.Money variance = 10;
  double variance_percent = 11;
  l8common.Money prior_period = 12;
  string description = 13;
  int64 entry_date = 14;
  string reference = 15;
}
